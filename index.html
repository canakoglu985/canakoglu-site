<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Çanakoğlu Market</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;padding:20px">

<h2>Çanakoğlu Online Market (Test)</h2>

<button onclick="login()">Giriş Yap</button>
<button onclick="register()">Kayıt Ol</button>
<button onclick="createOrder()">Sipariş Ver</button>

<script>
const supabaseClient = supabase.createClient(
  "https://jpguymicdiujhutnycvl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I"
);

// 🔑 GİRİŞ
async function login(){
  const email = prompt("Email gir");
  const password = prompt("Şifre gir");

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if(error){
    alert(error.message);
  } else {
    alert("Giriş başarılı");
  }
}

// 📝 KAYIT
async function register(){
  const email = prompt("Email");
  const password = prompt("Şifre");
  const name = prompt("Ad Soyad");
  const phone = prompt("Telefon");
  const address = prompt("Adres");

  const { data, error } = await supabaseClient.auth.signUp({
    email, password
  });

  if(error){
    alert(error.message);
    return;
  }

  await supabaseClient.from("profiles").insert([{
    id: data.user.id,
    email,
    full_name: name,
    phone,
    address
  }]);

  alert("Kayıt tamam");
}

// 🛒 SİPARİŞ
async function createOrder(){

  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData.user;

  if(!user){
    alert("Önce giriş yap");
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  // order oluştur
  const { data: order, error } = await supabaseClient
    .from("orders")
    .insert([{
      customer_id: user.id,
      customer_name: profile.full_name,
      phone: profile.phone,
      address: profile.address,
      total_amount: 100,
      total: 100,
      status: "Yeni",
      payment_method: "Kapıda Nakit",
      delivery_slot: "Hemen"
    }])
    .select()
    .single();

  if(error){
    alert("Order hata");
    console.log(error);
    return;
  }

  // order_items (DÜZELTİLMİŞ)
  await supabaseClient.from("order_items").insert([{
    order_id: order.id,
    product_name: "Test Ürün",
    quantity: 1,
    unit_price: 100,
    line_total: 100
  }]);

  alert("SİPARİŞ TAMAM");
}
</script>

</body>
</html>
