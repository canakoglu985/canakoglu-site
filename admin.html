<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çanakoğlu Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef3f8;
}
header{
  background:#1e3a5f;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}
.logo{
  width:70px;
  height:70px;
  border-radius:50%;
}
nav button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}
.section{
  display:none;
  padding:20px;
}
.active{
  display:block;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  margin-bottom:20px;
}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <img src="https://i.ibb.co/2TtYjGb/logo.png" class="logo">
    <div>
      <h2>Çanakoğlu Admin Panel</h2>
    </div>
  </div>

  <nav>
    <button onclick="showSection('urunler')">Ürünler</button>
    <button onclick="showSection('siparis')">Siparişler</button>
    <button onclick="showSection('banner')">Banner</button>
    <button onclick="showSection('durum')">Canlı Durum</button>
    <button onclick="window.location.href='index.html'">Müşteri Sayfası</button>
  </nav>
</header>

<div id="urunler" class="section active">
  <div class="card">
    <h3>Ürün Yönetimi</h3>
    <p>Buraya ürün ekleme / silme sistemi bağlanacak</p>
  </div>
</div>

<div id="siparis" class="section">
  <div class="card">
    <h3>Siparişler</h3>
    <p>Gelen siparişler burada listelenecek</p>
  </div>
</div>

<div id="banner" class="section">
  <div class="card">
    <h3>Banner Yönetimi</h3>
    <p>Banner görselleri buradan değiştirilecek</p>
  </div>
</div>

<div id="durum" class="section">
  <div class="card">
    <h3>Canlı Durum</h3>
    <p>Sistem durumu burada görünecek</p>
  </div>
</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
