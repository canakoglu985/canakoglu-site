<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesabım</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef3f9;margin:0}
.wrap{max-width:800px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:16px;margin-bottom:20px}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:12px;background:#f49a27;color:#fff;border:none;border-radius:10px;font-weight:bold}
.order{border:1px solid #ddd;padding:10px;border-radius:10px;margin-bottom:10px}
</style>

</head>

<body>

<div class="wrap">

<div class="card">
<h2>Giriş Yap</h2>
<input id="loginEmail" placeholder="E-posta">
<input id="loginPassword" type="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
<div id="loginStatus"></div>
</div>

<div class="card">
<h2>Siparişlerim</h2>
<div id="ordersBox"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://jpguymicdiujhutnycvl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

const CART_KEY = "canakoglu_cart_v1";

/* AUTH */

async function login(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById("loginStatus").innerText = error.message;
    return;
  }

  document.getElementById("loginStatus").innerText = "Giriş başarılı";
  afterLogin();
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data?.user;
}

/* PROFILE */

async function getProfile(){
  const user = await getUser();
  if(!user) return null;

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  return data;
}

/* ORDER */

function getCart(){
  return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
}

async function createOrderIfNeeded(){
  const params = new URLSearchParams(window.location.search);
  if(params.get("redirect") !== "order") return;

  const user = await getUser();
  if(!user) return;

  const cart = getCart();
  if(!cart.length) return;

  const profile = await getProfile();
  if(!profile) return;

  const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

  const { data: order } = await supabase
    .from("orders")
    .insert({
      customer_id: user.id,
      customer_name: profile.full_name,
      phone: profile.phone,
      address: profile.address,
      status: "yeni",
      total: total,
      total_amount: total
    })
    .select()
    .single();

  const items = cart.map(i => ({
    order_id: order.id,
    product_name: i.name,
    quantity: i.quantity,
    unit_price: i.price
  }));

  await supabase.from("order_items").insert(items);

  localStorage.removeItem(CART_KEY);
}

/* LOAD ORDERS */

async function loadOrders(){
  const user = await getUser();
  if(!user) return;

  const { data } = await supabase
    .from("orders")
    .select("*")
    .eq("customer_id", user.id)
    .order("created_at",{ascending:false});

  const box = document.getElementById("ordersBox");

  if(!data || !data.length){
    box.innerHTML = "Sipariş yok";
    return;
  }

  box.innerHTML = data.map(o => `
    <div class="order">
      <b>#${o.id}</b><br>
      ${o.status}<br>
      ${o.total} TL
    </div>
  `).join("");
}

/* FLOW */

async function afterLogin(){
  await createOrderIfNeeded();
  await loadOrders();
}

/* INIT */

(async () => {
  await afterLogin();
})();
</script>

</body>
</html>
