<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Giriş</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#1f4a84;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#fff;padding:30px;border-radius:20px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:10px;background:#f39c12;border:none;border-radius:10px;color:#fff;font-weight:bold}
</style>
</head>
<body>

<div class="box">
<h2>Admin Giriş</h2>
<input id="password" type="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
<p id="msg"></p>
</div>

<script>
const SUPABASE_URL = 'https://jpguymicdiujhutnycvl.supabase.co';
const SUPABASE_KEY = 'BURAYA_ANON_KEY';
const ADMIN_EMAIL = 'admin@canakoglu.com';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email: ADMIN_EMAIL,
    password
  });

  if(error){
    document.getElementById("msg").innerText = error.message;
    return;
  }

  // başarılıysa panel aç
  window.location.href = "panel.html";
}
</script>

</body>
</html>
