<script>
const SUPABASE_URL = "https://jpguymicdiujhutnycvl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const CART_KEY = "canakoglu_cart_v1";

/* ---------------- BASIC ---------------- */

function setStatus(id, text, ok=false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text || "";
  el.className = "status " + (text ? (ok ? "ok" : "error") : "");
}

function money(v){
  return Number(v||0).toLocaleString("tr-TR") + " TL";
}

/* ---------------- AUTH ---------------- */

async function getUser(){
  const { data } = await client.auth.getUser();
  return data?.user || null;
}

async function login(){
  setStatus("loginStatus","");
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPassword").value;

  const { error } = await client.auth.signInWithPassword({ email, password: pass });

  if(error){
    setStatus("loginStatus", error.message);
    return;
  }

  setStatus("loginStatus","Giriş başarılı",true);
  afterLogin();
}

async function register(){
  setStatus("registerStatus","");

  const email = document.getElementById("registerEmail").value;
  const pass = document.getElementById("registerPassword").value;
  const name = document.getElementById("registerName").value;
  const phone = document.getElementById("registerPhone").value;
  const address = document.getElementById("registerAddress").value;

  const { data, error } = await client.auth.signUp({ email, password: pass });

  if(error){
    setStatus("registerStatus", error.message);
    return;
  }

  await client.from("profiles").upsert({
    id: data.user.id,
    email,
    full_name: name,
    phone,
    address
  });

  setStatus("registerStatus","Kayıt başarılı",true);
  afterLogin();
}

async function logout(){
  await client.auth.signOut();
  location.reload();
}

/* ---------------- PROFILE ---------------- */

async function getProfile(){
  const user = await getUser();
  if(!user) return null;

  const { data } = await client
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  return data;
}

async function saveProfile(){
  const user = await getUser();
  if(!user) return;

  await client.from("profiles").upsert({
    id:user.id,
    email:user.email,
    full_name:document.getElementById("profileName").value,
    phone:document.getElementById("profilePhone").value,
    address:document.getElementById("profileAddress").value
  });

  setStatus("saveProfileStatus","Kaydedildi",true);
}

/* ---------------- ORDER ---------------- */

function getCart(){
  return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
}

async function createOrderIfNeeded(){
  const params = new URLSearchParams(location.search);
  if(params.get("redirect") !== "order") return;

  const user = await getUser();
  if(!user) return;

  const cart = getCart();
  if(!cart.length) return;

  const profile = await getProfile();
  if(!profile) return;

  const total = cart.reduce((s,i)=> s + i.price*i.quantity,0);

  const { data: order } = await client.from("orders").insert({
    customer_id:user.id,
    customer_name:profile.full_name,
    phone:profile.phone,
    address:profile.address,
    status:"yeni",
    total,
    total_amount:total
  }).select().single();

  const items = cart.map(i=>({
    order_id:order.id,
    product_name:i.name,
    quantity:i.quantity,
    unit_price:i.price,
    line_total:i.price*i.quantity
  }));

  await client.from("order_items").insert(items);

  localStorage.removeItem(CART_KEY);
}

/* ---------------- LOAD ORDERS ---------------- */

async function loadOrders(){
  const user = await getUser();
  if(!user) return;

  const { data: orders } = await client
    .from("orders")
    .select("*")
    .eq("customer_id", user.id)
    .order("created_at",{ascending:false});

  const box = document.getElementById("ordersBox");

  if(!orders?.length){
    box.innerHTML = "Sipariş yok";
    return;
  }

  box.innerHTML = orders.map(o=>`
    <div style="border:1px solid #ddd;padding:10px;margin-bottom:10px;">
      <b>#${o.id}</b><br>
      ${o.status}<br>
      ${money(o.total)}
    </div>
  `).join("");
}

/* ---------------- FLOW ---------------- */

async function afterLogin(){
  await createOrderIfNeeded();
  await loadOrders();
}

/* ---------------- EVENTS ---------------- */

document.getElementById("loginBtn").onclick = login;
document.getElementById("registerBtn").onclick = register;
document.getElementById("saveProfileBtn").onclick = saveProfile;
document.getElementById("menuLogoutBtn").onclick = logout;

/* ---------------- INIT ---------------- */

(async ()=>{
  await afterLogin();
})();
</script>
