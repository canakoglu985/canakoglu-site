<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Çanakoğlu Market</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
.product { background:white; padding:10px; margin:10px; border-radius:10px; }
button { padding:10px; margin-top:5px; cursor:pointer; }
.cart { position:fixed; right:20px; top:20px; background:white; padding:10px; }
#whatsappBox {
  display:none;
  position:fixed;
  bottom:20px;
  left:20px;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div style="background:red;color:white;padding:10px;">TEST AKTİF</div>

<h1>Çanakoğlu Market</h1>

<div id="products"></div>

<div class="cart">
  <h3>Sepet</h3>
  <div id="cart"></div>
  <button onclick="placeOrder()">Sipariş Ver</button>
</div>

<div id="whatsappBox">
  <h3>Sipariş alındı</h3>
  <button id="wpBtn">WhatsApp ile Gönder</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://jpguymicdiujhutnycvl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I"
);

const WHATSAPP = "905518857099";

let cart = [];

const products = [
  {name:"Ekmek", price:12},
  {name:"Yumurta", price:50},
  {name:"Çay", price:195}
];

function renderProducts(){
  const div = document.getElementById("products");
  div.innerHTML="";
  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="product">
        ${p.name} - ${p.price} TL
        <br>
        <button onclick="addToCart(${i})">Sepete ekle</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const div = document.getElementById("cart");
  div.innerHTML="";
  cart.forEach(p=>{
    div.innerHTML += `${p.name}<br>`;
  });
}

async function placeOrder(){
  const total = cart.reduce((s,p)=>s+p.price,0);

  const { error } = await supabase.from("orders").insert([
    { customer_name:"Misafir", total:total }
  ]);

  if(error){
    alert("Hata: "+error.message);
    return;
  }

  document.getElementById("whatsappBox").style.display="block";

  const text = encodeURIComponent(
    "Yeni sipariş\nToplam: "+total+" TL"
  );

  document.getElementById("wpBtn").onclick = ()=>{
    window.open(`https://wa.me/${WHATSAPP}?text=${text}`, "_blank");
  };

  cart=[];
  renderCart();
}

renderProducts();
</script>

</body>
</html>
