<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çanakoğlu Kapıda</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f6fb;
}

/* HEADER */
header{
  background:white;
  padding:15px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.logo-wrap{
  width:90px;
  height:90px;
  cursor:pointer;
}

.logo-wrap svg{
  width:100%;
  height:100%;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px;
  background:linear-gradient(135deg,#082b78,#f28a12);
  color:white;
}

.hero svg{
  width:160px;
  margin-bottom:15px;
}

/* PRODUCT */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f28a12;
  color:white;
  cursor:pointer;
}

/* SEPET */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,0.1);
  padding:15px;
}

#scrollTopBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#082b78;
  color:white;
  display:none;
}
</style>
</head>

<body>

<header>

<div class="logo-wrap" onclick="goTop()">

<!-- SVG LOGO -->
<svg viewBox="0 0 1200 1200">
<circle cx="600" cy="600" r="560" fill="#0b2e73"/>
<text x="600" y="350" text-anchor="middle" font-size="220" fill="#f28a12" font-weight="900">ÇA</text>
<text x="600" y="580" text-anchor="middle" font-size="120" fill="white">Çanakoğlu</text>
<text x="600" y="720" text-anchor="middle" font-size="80" fill="white">KAPIDA</text>
</svg>

</div>

<a href="hesap.html">Hesabım</a>

</header>

<div class="hero">

<svg viewBox="0 0 1200 1200">
<circle cx="600" cy="600" r="560" fill="#0b2e73"/>
<text x="600" y="350" text-anchor="middle" font-size="220" fill="#f28a12" font-weight="900">ÇA</text>
<text x="600" y="580" text-anchor="middle" font-size="120" fill="white">Çanakoğlu</text>
<text x="600" y="720" text-anchor="middle" font-size="80" fill="white">KAPIDA</text>
</svg>

<h2>Tek Tıkla Kapımda</h2>

</div>

<div class="products" id="products"></div>

<div class="cart">
<h3>Sepet</h3>
<div id="cartItems"></div>
<h4 id="total">0 TL</h4>
<button onclick="goOrder()">Sipariş Ver</button>
</div>

<button id="scrollTopBtn" onclick="goTop()">↑</button>

<script>
const supabase = window.supabase.createClient(
"https://jpguymicdiujhutnycvl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I"
);

let cart=[];

async function loadProducts(){
  const {data}=await supabase.from("products").select("*");

  const div=document.getElementById("products");
  div.innerHTML="";

  data.forEach(p=>{
    div.innerHTML+=`
      <div class="card">
        <b>${p.name}</b><br>
        ${p.price} TL<br>
        <button onclick="addCart('${p.name}',${p.price})">Ekle</button>
      </div>
    `;
  });
}

function addCart(name,price){
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  const div=document.getElementById("cartItems");
  div.innerHTML="";
  let total=0;

  cart.forEach(c=>{
    total+=c.price;
    div.innerHTML+=c.name+"<br>";
  });

  document.getElementById("total").innerText=total+" TL";
}

function goOrder(){
  localStorage.setItem("cart",JSON.stringify(cart));
  window.location="hesap.html?redirect=order";
}

function goTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

window.addEventListener("scroll",()=>{
  scrollTopBtn.style.display=window.scrollY>200?"block":"none";
});

loadProducts();
</script>

</body>
</html>
