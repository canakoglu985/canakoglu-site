<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Banner Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>📢 Reklam Bannerları</h2>

<input id="bTitle" placeholder="Başlık"><br>
<input id="bDesc" placeholder="Açıklama"><br>
<input id="bImage" placeholder="Görsel URL"><br>
<input id="bOrder" type="number" placeholder="Sıra"><br>

<select id="bActive">
  <option value="true">Aktif</option>
  <option value="false">Pasif</option>
</select><br><br>

<button onclick="saveBanner()">Banner Kaydet</button>

<hr>

<div id="bannerList"></div>

<script>
const client = supabase.createClient(
  "https://jpguymicdiujhutnycvl.supabase.co",
  "YOUR_ANON_KEY"
);

async function saveBanner(){
  const payload = {
    title: document.getElementById('bTitle').value,
    description: document.getElementById('bDesc').value,
    image_url: document.getElementById('bImage').value,
    sort_order: Number(document.getElementById('bOrder').value || 0),
    is_active: document.getElementById('bActive').value === "true"
  };

  await client.from("banners").insert([payload]);
  loadBanners();
}

async function loadBanners(){
  const { data } = await client
    .from("banners")
    .select("*")
    .order("sort_order");

  document.getElementById("bannerList").innerHTML =
    data.map(b => `
      <div style="margin:10px 0;">
        <img src="${b.image_url}" width="200"><br>
        <b>${b.title}</b><br>
        ${b.description}
      </div>
    `).join("");
}

loadBanners();
</script>

</body>
</html>
