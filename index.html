<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çanakoğlu Market</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* HEADER */
.header{
  background:#ff6a00;
  color:#fff;
  padding:15px;
  font-weight:900;
}

/* HERO */
.hero{
  margin:20px;
  border-radius:20px;
  overflow:hidden;
}

.hero-slide{
  display:none;
  padding:40px;
  color:#fff;
}

.hero-slide.active{
  display:block;
}

.hero-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.hero-text h1{
  font-size:34px;
  margin:10px 0;
}

.hero-badge{
  background:#fff;
  color:#ff6a00;
  padding:6px 12px;
  border-radius:999px;
  font-weight:800;
}

.hero-btn{
  margin-top:10px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.hero-content img{
  width:220px;
  border-radius:16px;
}

/* DOTS */
.hero-dots{
  text-align:center;
  margin-top:10px;
}
.dot{
  width:8px;height:8px;background:#ccc;
  display:inline-block;border-radius:50%;margin:4px;
}
.dot.active{background:#ff6a00}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:14px;
}

.price{
  color:#ff6a00;
  font-weight:900;
}

.btn{
  width:100%;
  padding:10px;
  background:#ff6a00;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  Çanakoğlu Market
</div>

<!-- HERO -->
<section class="hero">

<div class="hero-slide active" style="background:linear-gradient(135deg,#ff7a00,#ffb347);">
  <div class="hero-content">
    <div class="hero-text">
      <span class="hero-badge">%40 İNDİRİM</span>
      <h1>Bakliyat & Pirinç</h1>
      <p>Dev kampanya başladı</p>
      <button class="hero-btn">Alışverişe Başla</button>
    </div>
    <img src="https://images.unsplash.com/photo-1604908176997-4311e2c5b7f6">
  </div>
</div>

<div class="hero-slide" style="background:linear-gradient(135deg,#0061ff,#60efff);">
  <div class="hero-content">
    <div class="hero-text">
      <span class="hero-badge">YENİ</span>
      <h1>Temizlik Ürünleri</h1>
      <p>Büyük fırsat</p>
      <button class="hero-btn">Hemen İncele</button>
    </div>
    <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
  </div>
</div>

<div class="hero-dots">
  <span class="dot active"></span>
  <span class="dot"></span>
</div>

</section>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<script>
const products = [
  {id:1,name:"Domates",price:25},
  {id:2,name:"Peynir",price:80},
  {id:3,name:"Süt",price:30},
  {id:4,name:"Yumurta",price:60}
];

const container = document.getElementById("products");

function render(){
  container.innerHTML = products.map(p=>`
    <div class="card">
      <strong>${p.name}</strong>
      <div class="price">${p.price} TL</div>
      <button class="btn" onclick="add(${p.id})">Sepete Ekle</button>
    </div>
  `).join("");
}

let cart = JSON.parse(localStorage.getItem("canakoglu_cart_v1")||"[]");

function add(id){
  const p = products.find(x=>x.id==id);
  const item = cart.find(x=>x.id==id);
  if(item){
    item.quantity++;
  }else{
    cart.push({...p,quantity:1});
  }
  localStorage.setItem("canakoglu_cart_v1",JSON.stringify(cart));
  alert("Sepete eklendi");
}

render();

/* SLIDER */
let i=0;
const slides=document.querySelectorAll(".hero-slide");
const dots=document.querySelectorAll(".dot");

setInterval(()=>{
  slides[i].classList.remove("active");
  dots[i].classList.remove("active");

  i=(i+1)%slides.length;

  slides[i].classList.add("active");
  dots[i].classList.add("active");
},4000);
</script>

</body>
</html>
