<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çanakoğlu Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eef3f9;--card:#ffffff;--text:#17324f;--muted:#6f8196;--primary:#f49a27;--primary-2:#ffb34d;
      --navy:#1d4678;--border:#dbe6f1;--danger:#d93025;--success:#1e7b36;--warn:#c97507;
      --shadow:0 14px 34px rgba(10,28,52,.10);--soft:0 8px 20px rgba(18,50,85,.07);
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important} a{text-decoration:none}
    header{background:linear-gradient(135deg, rgba(12,34,63,.98) 0%, rgba(20,55,94,.98) 45%, rgba(29,70,120,.98) 100%);
      color:#fff;padding:18px 20px;box-shadow:0 14px 34px rgba(10,28,52,.22)}
    .header-inner,.wrap{max-width:1320px;margin:0 auto}
    .header-inner{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .brand-title{font-size:30px;font-weight:900}.brand-sub{font-size:14px;opacity:.92;margin-top:4px}.wrap{padding:22px}
    .btn{border:none;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s ease}
    .btn:hover{transform:translateY(-1px);filter:brightness(1.02)} .primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-2) 100%);color:#fff}
    .secondary{background:#edf4fb;color:var(--navy);border:1px solid var(--border)} .ghost{background:#fff;color:var(--navy);border:1px solid var(--border)}
    .danger{background:var(--danger);color:#fff}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:var(--soft)}
    .login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#1f4a84}
    .login-card{width:min(460px,100%);background:#fff;border-radius:28px;padding:30px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
    .login-card h1{margin:0 0 18px;color:#16375e}
    .fixed-mail{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:#f6f9fc;color:#16375e;font-weight:800;margin-bottom:14px}
    .status-box{margin-top:12px;padding:14px;border-radius:14px;background:#f7f9fc;border:1px solid var(--border);font-weight:800}
    .status-ok{color:var(--success)} .status-err{color:var(--danger)} .status-warn{color:var(--warn)}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .stat{background:#fff;border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:var(--soft)}
    .stat .label{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:10px}
    .stat .value{font-size:24px;font-weight:900;color:var(--navy)}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:18px;background:#fff}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:12px 14px;border-bottom:1px solid #eef3f9;text-align:left;vertical-align:top}
    th{font-size:13px;color:var(--muted);font-weight:900;background:#fbfcfe}
    .muted{color:var(--muted)} .small{font-size:12px}
    .pill{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:900}
    .status-yeni{background:#fff5e7;color:#c97507;border:1px solid rgba(244,154,39,.2)}
    .status-hazirlaniyor{background:#eef4ff;color:#225996;border:1px solid #cddcf7}
    .status-yolda{background:#f3efff;color:#6a36c7;border:1px solid #ddd0ff}
    .status-teslim{background:#edf9f0;color:#1e7b36;border:1px solid #c6e7cf}
    .status-iptal{background:#fff1f1;color:#c62828;border:1px solid #f0c9c9}
    .top-note{position:fixed;top:18px;right:18px;background:#17324f;color:#fff;padding:14px 16px;border-radius:14px;display:none;z-index:9999;box-shadow:0 14px 30px rgba(0,0,0,.18)}
    select{padding:10px 12px;border:1px solid #c9d7e6;border-radius:12px;background:#fff;font:inherit}
    @media (max-width:980px){.stats{grid-template-columns:1fr 1fr}} @media (max-width:640px){.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="topNote" class="top-note"></div>

<div id="loginView" class="login-shell">
  <div class="login-card">
    <h1>Admin Paneli</h1>
    <div class="fixed-mail">Önce hesap sayfasından giriş yapın</div>
    <button id="loginBtn" class="btn primary" type="button" style="width:100%">Hesap Sayfasına Git</button>
    <div id="loginStatus" class="status-box">Hazır.</div>
  </div>
</div>

<div id="panelView" class="hidden">
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">Çanakoğlu Admin Panel</div>
        <div class="brand-sub">Sipariş yönetimi</div>
      </div>
      <div>
        <a class="btn ghost" href="index.html">Müşteri Ekranı</a>
        <a class="btn ghost" href="hesap.html">Hesap Ekranı</a>
        <button id="refreshBtn" class="btn secondary" type="button">Yenile</button>
        <button id="logoutBtn" class="btn danger" type="button">Çıkış Yap</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div id="globalStatus" class="status-box">Panel başlatılıyor...</div>

    <div class="stats">
      <div class="stat"><div class="label">Toplam Sipariş</div><div id="statOrders" class="value">0</div></div>
      <div class="stat"><div class="label">Yeni Sipariş</div><div id="statNewOrders" class="value">0</div></div>
      <div class="stat"><div class="label">Teslim Edilen</div><div id="statDelivered" class="value">0</div></div>
      <div class="stat"><div class="label">Toplam Ciro</div><div id="statRevenue" class="value">0 TL</div></div>
    </div>

    <section class="card">
      <h2 style="margin-top:0">Siparişler</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Sipariş ID</th>
              <th>Müşteri</th>
              <th>Tutar</th>
              <th>Durum</th>
              <th>Ödeme</th>
              <th>Teslimat</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="6" class="muted">Yükleniyor...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<script>
const SUPABASE_URL = "https://jpguymicdiujhutnycvl.supabase.co";
const SUPABASE_KEY = "sb_publishable_qhih14wKxwoit8TtaQwCvg_T04SQLAN";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let pollTimer = null;

function money(v){
  const num = Number(v || 0);
  return new Intl.NumberFormat('tr-TR', { style:'currency', currency:'TRY', maximumFractionDigits:2 }).format(num);
}
function setLoginStatus(text, ok=false){
  const el = document.getElementById('loginStatus');
  if (!el) return;
  el.textContent = text;
  el.className = 'status-box ' + (ok ? 'status-ok' : 'status-err');
}
function setGlobalStatus(text, ok=true, warn=false){
  const el = document.getElementById('globalStatus');
  if (!el) return;
  el.textContent = text;
  el.className = 'status-box ' + (warn ? 'status-warn' : (ok ? 'status-ok' : 'status-err'));
}
function topNote(text){
  const el = document.getElementById('topNote');
  if (!el) return;
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(window.__noteTimer);
  window.__noteTimer = setTimeout(() => el.style.display = 'none', 2500);
}
function openPanel() {
  document.getElementById('loginView')?.classList.add('hidden');
  document.getElementById('panelView')?.classList.remove('hidden');
}
function closePanel() {
  document.getElementById('loginView')?.classList.remove('hidden');
  document.getElementById('panelView')?.classList.add('hidden');
}
async function getCurrentUser() {
  const { data, error } = await client.auth.getUser();
  if (error) return null;
  return data?.user || null;
}
async function getCurrentProfile() {
  const user = await getCurrentUser();
  if (!user) return null;

  const { data, error } = await client
    .from('profiles')
    .select('id, email, role, full_name')
    .eq('id', user.id)
    .single();

  if (error) return null;
  return data || null;
}
async function checkAdminAccess() {
  const user = await getCurrentUser();

  if (!user) {
    setLoginStatus('Önce hesap sayfasından giriş yapmalısınız.');
    return false;
  }

  const profile = await getCurrentProfile();

  if (!profile) {
    setLoginStatus('Profil kaydı bulunamadı.');
    return false;
  }

  if (String(profile.role || '').toLowerCase() !== 'admin') {
    setLoginStatus('Bu hesap admin değil.');
    await client.auth.signOut();
    setTimeout(() => { window.location.href = 'hesap.html'; }, 1200);
    return false;
  }

  return true;
}
async function login() { window.location.href = 'hesap.html'; }
async function logout() {
  clearInterval(pollTimer);
  try { await client.auth.signOut(); } catch (_) {}
  window.location.href = 'hesap.html';
}
function statusBadge(status='yeni'){
  const s = String(status || 'yeni').toLowerCase();
  return `<span class="pill status-${s}">${s}</span>`;
}
function renderStats(orders){
  const total = orders.length;
  const newCount = orders.filter(o => String(o.status || '').toLowerCase() === 'yeni').length;
  const deliveredCount = orders.filter(o => String(o.status || '').toLowerCase() === 'teslim').length;
  const revenue = orders.reduce((sum, o) => sum + Number(o.total_amount || 0), 0);

  document.getElementById('statOrders').textContent = total;
  document.getElementById('statNewOrders').textContent = newCount;
  document.getElementById('statDelivered').textContent = deliveredCount;
  document.getElementById('statRevenue').textContent = money(revenue);
}
async function changeStatus(id, status){
  const { error } = await client
    .from("orders")
    .update({ status: status, updated_at: new Date().toISOString() })
    .eq("id", id);

  if(error){
    alert("Hata oldu");
    return;
  }

  topNote("Sipariş durumu güncellendi");
  await loadOrders();
}
async function loadOrders() {
  const { data, error } = await client
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    setGlobalStatus("Siparişler yüklenemedi.", false);
    return;
  }

  renderStats(data || []);

  const tbody = document.getElementById("ordersBody");

  if (!data || !data.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="muted">Henüz sipariş yok.</td></tr>`;
    setGlobalStatus("Sipariş bulunamadı.", true, true);
    return;
  }

  tbody.innerHTML = data.map(o => `
    <tr>
      <td>${o.id}</td>
      <td>
        <strong>${o.customer_name || "-"}</strong><br>
        <span class="small muted">${o.customer_phone || "-"}</span><br>
        <span class="small muted">${o.customer_address || "-"}</span>
      </td>
      <td>${money(o.total_amount || 0)}</td>
      <td>
        ${statusBadge(o.status)}
        <div style="margin-top:8px">
          <select onchange="changeStatus('${o.id}', this.value)">
            <option value="yeni" ${String(o.status).toLowerCase()==='yeni'?'selected':''}>yeni</option>
            <option value="hazirlaniyor" ${String(o.status).toLowerCase()==='hazirlaniyor'?'selected':''}>hazirlaniyor</option>
            <option value="yolda" ${String(o.status).toLowerCase()==='yolda'?'selected':''}>yolda</option>
            <option value="teslim" ${String(o.status).toLowerCase()==='teslim'?'selected':''}>teslim</option>
            <option value="iptal" ${String(o.status).toLowerCase()==='iptal'?'selected':''}>iptal</option>
          </select>
        </div>
      </td>
      <td>${o.payment_method || "-"}</td>
      <td>${o.delivery_slot || "-"}</td>
    </tr>
  `).join("");

  setGlobalStatus("Siparişler yüklendi.", true);
}
function startPolling(){
  clearInterval(pollTimer);
  pollTimer = setInterval(loadOrders, 15000);
}
async function initAdminPage() {
  closePanel();

  const allowed = await checkAdminAccess();
  if (!allowed) return;

  openPanel();
  setLoginStatus('Admin girişi onaylandı.', true);
  await loadOrders();
  startPolling();
}
document.getElementById('loginBtn')?.addEventListener('click', login);
document.getElementById('logoutBtn')?.addEventListener('click', logout);
document.getElementById('refreshBtn')?.addEventListener('click', loadOrders);
window.addEventListener('DOMContentLoaded', async () => {
  await initAdminPage();
});
</script>
</body>
</html>
