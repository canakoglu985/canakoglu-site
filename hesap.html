<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesabım - Çanakoğlu</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f3f6fb;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.hero {
  background:linear-gradient(135deg,#082b78,#f28a12);
  color:white;
  padding:30px;
  border-radius:20px;
  margin-bottom:20px;
}

.quick-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}

.quick-btn {
  padding:15px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:white;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button.main {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#f28a12;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.order-box {
  border:1px solid #ddd;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h2>Çanakoğlu hesabını yönet</h2>
  <p>Giriş yap, adresini güncelle ve siparişlerini takip et</p>

  <div class="quick-grid">
    <button class="quick-btn" onclick="gitLogin()">Hızlı Giriş</button>
    <button class="quick-btn" onclick="gitAdres()">Adres</button>
    <button class="quick-btn" onclick="gitSiparis()">Siparişler</button>
    <button class="quick-btn" onclick="gitSiparis()">PDF / Fiş</button>
  </div>
</div>

<div class="card" id="loginBox">
  <h3>Giriş Yap</h3>
  <input id="email" placeholder="E-posta">
  <input id="password" type="password" placeholder="Şifre">
  <button class="main" onclick="login()">Giriş Yap</button>
</div>

<div class="card" id="profileBox" style="display:none">
  <h3>Hesap Bilgileri</h3>
  <input id="name" placeholder="Ad Soyad">
  <input id="phone" placeholder="Telefon">
  <input id="address" placeholder="Adres">
  <button class="main" onclick="saveProfile()">Kaydet</button>
</div>

<div class="card">
  <h3>Siparişlerim</h3>
  <div id="orders"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://jpguymicdiujhutnycvl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

// NAV
function gitLogin(){window.scrollTo({top:0,behavior:"smooth"})}
function gitAdres(){document.getElementById("profileBox").scrollIntoView({behavior:"smooth"})}
function gitSiparis(){document.getElementById("orders").scrollIntoView({behavior:"smooth"})}

// LOGIN
async function login(){
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    alert("Hatalı giriş");
  } else {
    alert("Giriş başarılı");
    loadUser();
  }
}

// USER LOAD
async function loadUser(){
  const { data } = await supabase.auth.getUser();

  if(!data.user){
    document.getElementById("loginBox").style.display="block";
    document.getElementById("profileBox").style.display="none";
    return;
  }

  document.getElementById("loginBox").style.display="none";
  document.getElementById("profileBox").style.display="block";

  const { data:profile } = await supabase
  .from("profiles")
  .select("*")
  .eq("id", data.user.id)
  .single();

  if(profile){
    name.value = profile.full_name || "";
    phone.value = profile.phone || "";
    address.value = profile.address || "";
  }

  loadOrders();
}

// SAVE PROFILE
async function saveProfile(){
  const { data } = await supabase.auth.getUser();

  await supabase.from("profiles").upsert({
    id: data.user.id,
    email: data.user.email,
    full_name: name.value,
    phone: phone.value,
    address: address.value
  });

  alert("Kaydedildi");
}

// LOAD ORDERS
async function loadOrders(){
  const { data:user } = await supabase.auth.getUser();

  const { data } = await supabase
  .from("orders")
  .select("*")
  .eq("customer_name", name.value);

  const div = document.getElementById("orders");
  div.innerHTML="";

  if(!data || data.length==0){
    div.innerHTML="Sipariş yok";
    return;
  }

  data.forEach(o=>{
    div.innerHTML += `
      <div class="order-box">
        <b>${o.total} TL</b><br>
        ${o.address}<br>
        ${o.created_at}
      </div>
    `;
  });
}

loadUser();
</script>

</body>
</html>
