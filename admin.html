<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1f4a84;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login, .panel{
  background:#fff;
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

.panel{ display:none; }

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  background:#f39c12;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.logout{
  background:red;
  margin-top:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>Admin Giriş</h2>
<input type="password" id="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
<p id="msg"></p>
</div>

<!-- PANEL -->
<div class="panel" id="panelBox">
<h2>Admin Panel</h2>
<p>Hoşgeldin admin 👋</p>

<button class="logout" onclick="logout()">Çıkış Yap</button>
</div>

<script>
const SUPABASE_URL = 'https://jpguymicdiujhutnycvl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I';

const ADMIN_EMAIL = 'admin@canakoglu.com';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// SAYFA AÇILINCA OTURUM VAR MI
checkUser();

async function checkUser(){
  const { data } = await client.auth.getUser();

  if(data.user){
    showPanel();
  }
}

async function login(){
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email: ADMIN_EMAIL,
    password
  });

  if(error){
    document.getElementById("msg").innerText = error.message;
    return;
  }

  showPanel();
}

function showPanel(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("panelBox").style.display = "block";
}

async function logout(){
  await client.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
