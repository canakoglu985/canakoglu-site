<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çanakoğlu Kapıda</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f6fb;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #ddd;
}

.header{
  max-width:1300px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
}

/* LOGO PROFESYONEL */
.logo-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(8,43,120,0.3);
  border:2px solid #f28a12;
}

.brand-text{
  font-size:22px;
  font-weight:bold;
  color:#082b78;
}

.sub{
  font-size:12px;
  color:#666;
}

/* HERO */
.hero{
  max-width:1300px;
  margin:20px auto;
  background:linear-gradient(135deg,#082b78,#f28a12);
  border-radius:20px;
  padding:30px;
  color:white;
}

.hero h1{
  margin:0;
  font-size:40px;
}

.hero p{
  margin-top:10px;
}

/* ÜRÜNLER */
.products{
  max-width:1300px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  font-weight:bold;
  color:#082b78;
}

.btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f28a12;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="header">

<div class="logo-box">
<img src="data:image/jpeg;base64,PUT_LOGO_HERE" class="logo">

<div>
<div class="brand-text">Çanakoğlu Kapıda</div>
<div class="sub">Tek tıkla kapımda</div>
</div>
</div>

<a href="hesap.html">Hesabım</a>

</div>
</header>

<div class="hero">
<h1>Mahalle Marketin Artık Online</h1>
<p>Hızlı teslimat • Güvenli alışveriş • Canakoğlu kalitesi</p>
</div>

<div class="products" id="products"></div>

<script>
const client = supabase.createClient(
"https://jpguymicdiujhutnycvl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I"
);

async function load(){
const {data} = await client.from("products").select("*");

document.getElementById("products").innerHTML =
data.map(p=>`
<div class="card">
<img src="${p.image_url || ''}">
<h4>${p.name}</h4>
<div class="price">${p.price} TL</div>
<button class="btn">Sepete Ekle</button>
</div>
`).join("");
}

load();
</script>

</body>
</html>
