<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#eef3f9; --card:#fff; --text:#17324f; --muted:#6f8196; --primary:#f49a27;
    --navy:#1d4678; --border:#dbe6f1; --shadow:0 12px 30px rgba(18,50,85,.10);
    --soft:0 8px 18px rgba(18,50,85,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
  header{
    background:linear-gradient(135deg, rgba(12,34,63,.98) 0%, rgba(20,55,94,.98) 45%, rgba(29,70,120,.98) 100%);
    color:#fff;padding:18px 20px;box-shadow:0 14px 34px rgba(10,28,52,.22)
  }
  .wrap,.header-inner{max-width:1200px;margin:0 auto}
  .header-inner{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .brand-title{font-size:30px;font-weight:900}
  .brand-sub{font-size:14px;opacity:.9;margin-top:4px}
  .btn{
    border:none;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;
    text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px
  }
  .primary{background:linear-gradient(135deg,#f49a27 0%,#ffb34d 100%);color:#fff}
  .danger{background:#ef4444;color:#fff}
  .secondary{background:#edf4fb;color:var(--navy);border:1px solid var(--border)}
  .wrap{padding:22px}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:var(--soft);margin-bottom:18px}
  .config-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  label{display:block;font-size:13px;color:var(--navy);font-weight:800;margin-bottom:6px}
  input,select,textarea{
    width:100%;padding:12px;border:1px solid #c9d7e6;border-radius:14px;font:inherit;background:#fff;outline:none
  }
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .status{margin-top:12px;padding:14px;border-radius:14px;background:#f7f9fc;border:1px solid var(--border);font-weight:800}
  .ok{color:#1e7b36}.err{color:#c62828}
  .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:var(--soft)}
  .stat .label{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:10px}
  .stat .value{font-size:24px;font-weight:900;color:var(--navy)}
  .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:18px;background:#fff}
  table{width:100%;border-collapse:collapse;min-width:900px}
  th,td{padding:12px 14px;border-bottom:1px solid #eef3f9;text-align:left;vertical-align:top}
  th{font-size:13px;color:var(--muted);font-weight:900;background:#fbfcfe}
  .pill{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:900}
  .status-yeni{background:#fff5e7;color:#c97507;border:1px solid rgba(244,154,39,.2)}
  .status-hazirlaniyor{background:#eef4ff;color:#225996;border:1px solid #cddcf7}
  .status-yolda{background:#f3efff;color:#6a36c7;border:1px solid #ddd0ff}
  .status-teslim{background:#edf9f0;color:#1e7b36;border:1px solid #c6e7cf}
  .status-iptal{background:#fff1f1;color:#c62828;border:1px solid #f0c9c9}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  @media (max-width:900px){
    .config-grid,.stats{grid-template-columns:1fr 1fr}
  }
  @media (max-width:600px){
    .config-grid,.stats{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="brand-title">Admin Panel</div>
      <div class="brand-sub">Sipariş yönetimi</div>
    </div>
    <div class="row">
      <button class="btn danger" id="logoutBtn" type="button">Çıkış Yap</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="panel">
    <h2 style="margin-top:0;color:#1d4678">Bağlantı Ayarları</h2>
    <div class="config-grid">
      <div>
        <label for="supabase-url">Supabase URL</label>
        <input id="supabase-url" />
      </div>
      <div>
        <label for="supabase-key">Anon Key</label>
        <input id="supabase-key" />
      </div>
      <div>
        <label for="market-phone">Market WhatsApp</label>
        <input id="market-phone" />
      </div>
    </div>
    <div class="row" style="margin-top:14px">
      <button class="btn primary" id="connectBtn" type="button">Bağlan</button>
      <button class="btn secondary" id="reloadBtn" type="button">Tüm Verileri Yenile</button>
    </div>
    <div id="global-status" class="status">Hazır.</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="label">Toplam Ürün</div><div id="stat-products" class="value">0</div></div>
    <div class="stat"><div class="label">Toplam Sipariş</div><div id="stat-orders" class="value">0</div></div>
    <div class="stat"><div class="label">Yeni Sipariş</div><div id="stat-new" class="value">0</div></div>
    <div class="stat"><div class="label">Bugün Ciro</div><div id="stat-revenue" class="value">0 TL</div></div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0;color:#1d4678">Siparişler</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Sipariş</th>
            <th>Müşteri</th>
            <th>Ürünler</th>
            <th>Toplam</th>
            <th>Durum</th>
            <th>Kaydet</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="6" class="muted">Henüz veri yok.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const READY_URL = 'https://jpguymicdiujhutnycvl.supabase.co';
const READY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I';
const ADMIN_EMAIL = 'admin@canakoglu.com';
const DEFAULT_PHONE = '905518857099';

let client = null;
let orders = [];
let orderItems = [];
let products = [];

function money(v){
  return new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(v||0)) + ' TL';
}
function setStatus(text, ok=false){
  const el = document.getElementById('global-status');
  el.textContent = text;
  el.className = 'status ' + (ok ? 'ok' : 'err');
}
function statusLabel(s=''){
  const v = String(s||'yeni').trim().toLowerCase();
  if(v === 'hazirlaniyor') return 'Hazırlanıyor';
  if(v === 'yolda') return 'Yolda';
  if(v === 'teslim') return 'Teslim';
  if(v === 'iptal') return 'İptal';
  return 'Yeni';
}
function statusClass(s=''){
  return 'status-' + String(s||'yeni').trim().toLowerCase();
}
function saveLocalConfig(){
  localStorage.setItem('canakoglu_admin_url', document.getElementById('supabase-url').value.trim());
  localStorage.setItem('canakoglu_admin_key', document.getElementById('supabase-key').value.trim());
  localStorage.setItem('canakoglu_market_phone', document.getElementById('market-phone').value.trim());
}
function loadLocalConfig(){
  document.getElementById('supabase-url').value = localStorage.getItem('canakoglu_admin_url') || READY_URL;
  document.getElementById('supabase-key').value = localStorage.getItem('canakoglu_admin_key') || READY_KEY;
  document.getElementById('market-phone').value = localStorage.getItem('canakoglu_market_phone') || DEFAULT_PHONE;
}
async function guard(){
  const authClient = supabase.createClient(READY_URL, READY_KEY);
  const { data } = await authClient.auth.getUser();
  const email = String(data?.user?.email || '').trim().toLowerCase();
  if(email !== ADMIN_EMAIL){
    window.location.href = 'admin.html';
  }
}
function updateStats(){
  document.getElementById('stat-products').textContent = String(products.length);
  document.getElementById('stat-orders').textContent = String(orders.length);
  document.getElementById('stat-new').textContent = String(orders.filter(o => String(o.status||'yeni').trim().toLowerCase() === 'yeni').length);
  const today = new Date().toISOString().slice(0,10);
  const revenue = orders.filter(o => String(o.created_at||'').slice(0,10) === today).reduce((s,o)=>s+Number(o.total_amount ?? o.total ?? 0),0);
  document.getElementById('stat-revenue').textContent = money(revenue);
}
function renderOrders(){
  const body = document.getElementById('ordersBody');
  if(!orders.length){
    body.innerHTML = '<tr><td colspan="6" class="muted">Henüz sipariş yok.</td></tr>';
    return;
  }
  body.innerHTML = orders.map(order => {
    const items = orderItems.filter(i => String(i.order_id) === String(order.id));
    const itemsHtml = items.length ? items.map(i => `<div class="small">${i.product_name || 'Ürün'} — ${i.quantity || 0}</div>`).join('') : '<span class="muted small">Ürün yok</span>';
    const current = String(order.status || 'yeni').trim().toLowerCase();
    return `
      <tr>
        <td>
          <strong>#${order.id}</strong>
          <div class="small muted">${new Date(order.created_at).toLocaleString('tr-TR')}</div>
        </td>
        <td>
          <strong>${order.customer_name || '-'}</strong>
          <div class="small muted">${order.phone || '-'}</div>
          <div class="small muted">${order.address || '-'}</div>
        </td>
        <td>${itemsHtml}</td>
        <td><strong>${money(order.total_amount ?? order.total ?? 0)}</strong></td>
        <td>
          <div class="row" style="align-items:center">
            <span class="pill ${statusClass(current)}">${statusLabel(current)}</span>
            <select id="status-${order.id}">
              <option value="yeni" ${current==='yeni'?'selected':''}>Yeni</option>
              <option value="hazirlaniyor" ${current==='hazirlaniyor'?'selected':''}>Hazırlanıyor</option>
              <option value="yolda" ${current==='yolda'?'selected':''}>Yolda</option>
              <option value="teslim" ${current==='teslim'?'selected':''}>Teslim</option>
              <option value="iptal" ${current==='iptal'?'selected':''}>İptal</option>
            </select>
          </div>
        </td>
        <td><button class="btn primary" type="button" onclick="saveOrderStatus('${order.id}', this)">Kaydet</button></td>
      </tr>
    `;
  }).join('');
}
async function loadAllData(){
  if(!client) return;
  setStatus('Veriler yükleniyor...', true);
  const [productsRes, ordersRes, itemsRes] = await Promise.all([
    client.from('products').select('*'),
    client.from('orders').select('*').order('created_at', { ascending:false }),
    client.from('order_items').select('*')
  ]);
  if(productsRes.error) throw productsRes.error;
  if(ordersRes.error) throw ordersRes.error;
  if(itemsRes.error) throw itemsRes.error;
  products = productsRes.data || [];
  orders = (ordersRes.data || []).map(o => ({...o, status: String(o.status || 'yeni').trim().toLowerCase()}));
  orderItems = itemsRes.data || [];
  updateStats();
  renderOrders();
  setStatus('Bağlantı başarılı. Veriler yüklendi.', true);
}
async function connectSupabase(){
  try{
    saveLocalConfig();
    const url = document.getElementById('supabase-url').value.trim();
    const key = document.getElementById('supabase-key').value.trim();
    if(!url || !key){
      setStatus('Supabase URL ve anon key gerekli.', false);
      return;
    }
    client = supabase.createClient(url, key);
    // lightweight test
    const test = await client.from('orders').select('id', { count:'exact', head:true });
    if(test.error) throw test.error;
    await loadAllData();
  }catch(err){
    console.error(err);
    setStatus('Bağlantı hatası: ' + (err.message || err), false);
  }
}
async function saveOrderStatus(orderId, btn){
  try{
    const select = document.getElementById('status-' + orderId);
    if(!select) return;
    btn.disabled = true;
    btn.textContent = 'Kaydediliyor...';
    const status = select.value;
    const { error } = await client.from('orders').update({ status }).eq('id', isNaN(Number(orderId)) ? orderId : Number(orderId));
    if(error) throw error;
    await loadAllData();
    setStatus('Sipariş durumu güncellendi.', true);
  }catch(err){
    console.error(err);
    setStatus('Durum kaydedilemedi: ' + (err.message || err), false);
  }finally{
    btn.disabled = false;
    btn.textContent = 'Kaydet';
  }
}
async function logoutAdmin(){
  try{
    const authClient = supabase.createClient(READY_URL, READY_KEY);
    await authClient.auth.signOut();
  }catch(e){}
  window.location.href = 'admin.html';
}

document.getElementById('connectBtn').addEventListener('click', connectSupabase);
document.getElementById('reloadBtn').addEventListener('click', loadAllData);
document.getElementById('logoutBtn').addEventListener('click', logoutAdmin);

(async function init(){
  try{
    await guard();
    loadLocalConfig();
    await connectSupabase();
  }catch(err){
    console.error(err);
    setStatus('Panel başlatılamadı: ' + (err.message || err), false);
  }
})();
</script>
</body>
</html>
