<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#eef3f9}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-top:20px}
input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc}
button{padding:12px;border:none;border-radius:10px;background:#f49a27;color:#fff;font-weight:bold;margin-top:10px;cursor:pointer}
.table{width:100%;margin-top:20px}
.table td{padding:10px;border-bottom:1px solid #eee}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>Admin Giriş</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
<div id="loginMsg"></div>
</div>

<!-- PANEL -->
<div id="panelBox" class="hidden">

<div class="card">
<h2>Admin Panel</h2>
<button onclick="logout()">Çıkış Yap</button>
</div>

<div class="card">
<h3>Siparişler</h3>
<table class="table" id="orders"></table>
</div>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://jpguymicdiujhutnycvl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I"
);

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById("loginMsg").innerText = "Hatalı giriş";
  } else {
    startPanel();
  }
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

async function startPanel(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("panelBox").classList.remove("hidden");

  loadOrders();
}

async function loadOrders(){
  const { data } = await supabase.from("orders").select("*").order("created_at",{ascending:false});

  const table = document.getElementById("orders");

  table.innerHTML = data.map(o => `
    <tr>
      <td>#${o.id}</td>
      <td>${o.customer_name || "-"}</td>
      <td>${o.total_amount || 0} TL</td>
      <td>
        <select onchange="updateStatus('${o.id}', this.value)">
          <option ${o.status=='yeni'?'selected':''}>yeni</option>
          <option ${o.status=='hazirlaniyor'?'selected':''}>hazirlaniyor</option>
          <option ${o.status=='yolda'?'selected':''}>yolda</option>
          <option ${o.status=='teslim'?'selected':''}>teslim</option>
        </select>
      </td>
    </tr>
  `).join("");
}

async function updateStatus(id, status){
  await supabase.from("orders").update({status}).eq("id", id);
  loadOrders();
}

// sayfa açılınca kontrol
(async ()=>{
  const { data } = await supabase.auth.getUser();
  if(data.user){
    startPanel();
  }
})();

</script>

</body>
</html>
