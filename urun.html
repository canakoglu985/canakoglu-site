<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urun Detayi - Canakoglu Kapida</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --card-soft:#f8fbfe;
      --text:#17324f;
      --muted:#72859b;
      --navy:#1f4d86;
      --navy-dark:#14395f;
      --blue:#2b74d8;
      --line:#dce7f2;
      --accent:#f49a27;
      --accent-2:#ffbe5c;
      --success:#1f8a49;
      --danger:#d93025;
      --warning:#c97507;
      --orange-gradient:linear-gradient(135deg,#f49a27 0%, #ffbe5c 100%);
      --blue-gradient:linear-gradient(135deg,#17457a 0%, #2868b5 100%);
      --soft-shadow:0 10px 24px rgba(18,50,85,.07);
      --shadow:0 18px 40px rgba(18,50,85,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,sans-serif;
    }
    a{text-decoration:none;color:inherit}
    button,input{font:inherit}

    .container{
      width:min(1380px, calc(100% - 28px));
      margin:0 auto;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:60;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(220,231,242,.9);
    }
    .header-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand-logo{
      width:74px;
      height:74px;
      border-radius:50%;
      background:#fff;
      border:2px solid #f3d5ad;
      display:grid;
      place-items:center;
      color:var(--navy);
      font-weight:900;
      text-align:center;
      line-height:1.05;
      box-shadow:var(--soft-shadow);
      flex-shrink:0;
      font-size:14px;
    }
    .brand-title{
      margin:0;
      color:#173b77;
      font-size:28px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-.03em;
    }
    .brand-sub{
      margin:6px 0 0;
      color:#667a91;
      font-size:13px;
      line-height:1.25;
      font-weight:700;
      max-width:170px;
    }

    .header-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .btn{
      border:none;
      border-radius:16px;
      padding:13px 18px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:900;
      transition:transform .18s ease, filter .18s ease;
      white-space:nowrap;
    }
    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.02);
    }
    .btn.primary{
      color:#fff;
      background:var(--orange-gradient);
      box-shadow:0 10px 22px rgba(244,154,39,.22);
    }
    .btn.secondary{
      color:var(--navy-dark);
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--soft-shadow);
    }

    .page{
      padding:20px 0 34px;
    }

    .top-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .crumbs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }
    .crumbs span:last-child{
      color:var(--navy-dark);
      font-weight:900;
    }

    .detail-layout{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
    }

    .gallery-card,
    .detail-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--soft-shadow);
      padding:22px;
    }

    .gallery-main{
      width:100%;
      height:520px;
      border-radius:24px;
      border:1px solid var(--line);
      background:#eef4f9;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .gallery-main img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .gallery-fallback{
      color:var(--muted);
      font-size:22px;
      font-weight:900;
    }

    .detail-tags{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background:#eef4ff;
      border:1px solid #d3e1f0;
      color:#225996;
    }
    .tag.campaign{
      background:#fff5e7;
      border-color:#f1d7b2;
      color:var(--warning);
    }
    .tag.stock{
      background:#edf8f0;
      border-color:#cfe8d7;
      color:var(--success);
    }
    .tag.out{
      background:#fff0f0;
      border-color:#efcaca;
      color:var(--danger);
    }

    .product-title{
      margin:0;
      color:var(--navy-dark);
      font-size:clamp(34px, 5vw, 54px);
      line-height:.96;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .product-sub{
      margin:14px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }

    .price-box{
      display:flex;
      align-items:flex-end;
      gap:14px;
      flex-wrap:wrap;
      margin:22px 0 10px;
    }
    .old-price{
      color:#97a8bb;
      font-size:24px;
      font-weight:900;
      text-decoration:line-through;
    }
    .price{
      color:#1f5fcc;
      font-size:54px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .discount-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      background:#fff5e7;
      border:1px solid #f1d7b2;
      color:var(--warning);
      font-size:14px;
      font-weight:900;
    }

    .stock-line{
      margin-top:6px;
      font-size:14px;
      font-weight:900;
    }
    .stock-line.ok{color:var(--success)}
    .stock-line.low{color:var(--warning)}
    .stock-line.out{color:var(--danger)}

    .qty-buy{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:22px;
    }
    .qty-box{
      display:flex;
      align-items:center;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:var(--soft-shadow);
    }
    .qty-box button{
      width:46px;
      height:50px;
      border:none;
      background:#fff;
      color:var(--navy);
      font-size:22px;
      font-weight:900;
      cursor:pointer;
    }
    .qty-box input{
      width:66px;
      height:50px;
      border:none;
      text-align:center;
      font-size:18px;
      font-weight:900;
      color:var(--navy-dark);
      outline:none;
      background:#fff;
    }
    .buy-main{
      flex:1 1 260px;
      min-height:52px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:22px;
    }
    .meta-card{
      background:var(--card-soft);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
    }
    .meta-label{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-bottom:8px;
    }
    .meta-value{
      color:var(--navy-dark);
      font-size:18px;
      font-weight:900;
      line-height:1.3;
    }

    .description-box{
      margin-top:22px;
      background:linear-gradient(180deg,#fbfdff,#f5f9fd);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
    }
    .description-box h3{
      margin:0 0 10px;
      color:var(--navy-dark);
      font-size:20px;
      font-weight:900;
    }
    .description-box p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.8;
    }

    .related-section{
      background:#fff;
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--soft-shadow);
      padding:22px;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .section-title{
      margin:0;
      color:var(--navy-dark);
      font-size:28px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.03em;
    }
    .section-copy{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
    }

    .related-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
    }
    .mini-card{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px;
      border-radius:24px;
      background:linear-gradient(180deg,#fff,#f9fbfe);
      border:1px solid rgba(29,70,120,.12);
      box-shadow:var(--soft-shadow);
    }
    .mini-image,
    .mini-fallback{
      width:100%;
      height:170px;
      border-radius:18px;
      background:#eef4f9;
      border:1px solid var(--line);
      object-fit:cover;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-weight:800;
    }
    .mini-name{
      color:var(--navy-dark);
      font-size:18px;
      line-height:1.22;
      font-weight:900;
      min-height:44px;
    }
    .mini-meta{
      color:var(--muted);
      font-size:13px;
    }
    .mini-price{
      color:#1f5fcc;
      font-size:28px;
      line-height:1;
      font-weight:900;
    }

    @media (max-width:1120px){
      .detail-layout{
        grid-template-columns:1fr;
      }
    }
    @media (max-width:760px){
      .container{
        width:min(100% - 18px, 1380px);
      }
      .header-inner{
        justify-content:center;
      }
      .gallery-main{
        height:340px;
      }
      .meta-grid{
        grid-template-columns:1fr;
      }
      .related-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <div class="brand-logo">canakoglu<br>Logo</div>
        <div>
          <h1 class="brand-title">Canakoglu<br>Kapida</h1>
          <p class="brand-sub">Tek tikla kapimda - mahalle marketin</p>
        </div>
      </a>

      <div class="header-actions">
        <a class="btn secondary" href="index.html">Ana Sayfa</a>
        <a class="btn secondary" href="hesap.html">Hesabim</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="top-actions">
        <div class="crumbs">
          <a href="index.html">Ana Sayfa</a>
          <span>/</span>
          <span id="crumbCategory">Urun</span>
          <span>/</span>
          <span id="crumbName">Detay</span>
        </div>
      </div>

      <div id="loadingBox" class="detail-card" style="padding:22px;text-align:center;font-weight:900;">Yukleniyor...</div>

      <div id="productArea" style="display:none;">
        <section class="detail-layout">
          <div class="gallery-card">
            <div id="mainImageBox" class="gallery-main"></div>
          </div>

          <div class="detail-card">
            <div id="detailTags" class="detail-tags"></div>
            <h2 id="productTitle" class="product-title">Urun</h2>
            <p id="productSubtitle" class="product-sub">Aciklama</p>

            <div class="price-box">
              <div id="oldPrice" class="old-price" style="display:none;"></div>
              <div id="currentPrice" class="price"></div>
              <div id="discountBadge" class="discount-badge" style="display:none;"></div>
            </div>

            <div id="stockLine" class="stock-line ok"></div>

            <div class="qty-buy">
              <div class="qty-box">
                <button type="button" onclick="changeQty(-1)">-</button>
                <input id="qtyInput" type="number" min="1" value="1" />
                <button type="button" onclick="changeQty(1)">+</button>
              </div>
              <button id="buyButton" class="btn primary buy-main" type="button" onclick="addCurrentProductToCart()">Sepete Ekle</button>
            </div>

            <div class="meta-grid">
              <div class="meta-card">
                <div class="meta-label">Kategori</div>
                <div id="metaCategory" class="meta-value">-</div>
              </div>
              <div class="meta-card">
                <div class="meta-label">Birim</div>
                <div id="metaUnit" class="meta-value">adet</div>
              </div>
              <div class="meta-card">
                <div class="meta-label">Barkod</div>
                <div id="metaBarcode" class="meta-value">-</div>
              </div>
            </div>

            <div class="description-box">
              <h3>Urun Aciklamasi</h3>
              <p id="productDescription">Bu urun icin aciklama eklenmemis.</p>
            </div>
          </div>
        </section>

        <section class="related-section">
          <div class="section-head">
            <div>
              <h3 class="section-title">Benzer Urunler</h3>
              <p class="section-copy">Ayni kategoriden diger urunleri inceleyebilirsin.</p>
            </div>
          </div>
          <div id="relatedGrid" class="related-grid"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://jpguymicdiujhutnycvl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZ3V5bWljZGl1amh1dG55Y3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQyMjcsImV4cCI6MjA5MTU4MDIyN30.ERKRF1rB2sodqaZ6HltLVYl8vCTZOx1Ve0HY39Zdl_I";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const CART_KEY = "canakoglu_cart_v1";

    let currentProduct = null;

    function money(value) {
      return new Intl.NumberFormat("tr-TR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(Number(value || 0)) + " TL";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function normalizeProduct(row) {
      return {
        id: row.id,
        name: row.name || row.product_name || row.title || "Urun",
        category: row.category || "Diger",
        price: Number(row.price || 0),
        comparePrice: Number(row.compare_at_price || 0),
        unit: row.unit || "adet",
        stock: row.stock_qty ?? row.stock ?? 0,
        image: row.image_url || row.image || "",
        campaignLabel: row.campaign_label || "",
        barcode: row.barcode || "-",
        description: row.description || "Bu urun icin aciklama eklenmemis."
      };
    }

    function readCart() {
      try { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); }
      catch { return []; }
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function changeQty(delta) {
      const input = document.getElementById("qtyInput");
      let value = Number(input.value || 1);
      value += delta;
      if (value < 1) value = 1;
      if (currentProduct && Number(currentProduct.stock || 0) > 0 && value > Number(currentProduct.stock || 0)) {
        value = Number(currentProduct.stock || 0);
      }
      input.value = value;
    }

    function stockClass(product) {
      const value = Number(product.stock || 0);
      if (value <= 0) return "out";
      if (value <= 5) return "low";
      return "ok";
    }

    function stockLabel(product) {
      const value = Number(product.stock || 0);
      if (value <= 0) return "Stokta yok";
      if (value <= 5) return `Az stok (${value})`;
      return `Stokta var - ${value} adet`;
    }

    function renderProduct(product) {
      currentProduct = product;
      document.getElementById("loadingBox").style.display = "none";
      document.getElementById("productArea").style.display = "block";

      document.getElementById("crumbCategory").textContent = product.category || "Kategori";
      document.getElementById("crumbName").textContent = product.name || "Urun";

      const imageBox = document.getElementById("mainImageBox");
      imageBox.innerHTML = product.image
        ? `<img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">`
        : `<div class="gallery-fallback">Gorsel yok</div>`;

      const tags = [];
      tags.push(`<span class="tag">${escapeHtml(product.category)}</span>`);
      if (product.campaignLabel) tags.push(`<span class="tag campaign">${escapeHtml(product.campaignLabel)}</span>`);
      if (Number(product.stock || 0) > 0) {
        tags.push(`<span class="tag stock">Stokta</span>`);
      } else {
        tags.push(`<span class="tag out">Tukendi</span>`);
      }
      document.getElementById("detailTags").innerHTML = tags.join("");

      document.getElementById("productTitle").textContent = product.name || "Urun";
      document.getElementById("productSubtitle").textContent = product.description || "Aciklama bulunamadi.";
      document.getElementById("currentPrice").textContent = money(product.price);
      document.getElementById("productDescription").textContent = product.description || "Bu urun icin aciklama eklenmemis.";
      document.getElementById("metaCategory").textContent = product.category || "-";
      document.getElementById("metaUnit").textContent = product.unit || "adet";
      document.getElementById("metaBarcode").textContent = product.barcode || "-";

      const oldPriceEl = document.getElementById("oldPrice");
      const discountBadge = document.getElementById("discountBadge");
      if (product.comparePrice > product.price) {
        oldPriceEl.style.display = "block";
        oldPriceEl.textContent = money(product.comparePrice);
        const percent = Math.round(((product.comparePrice - product.price) / product.comparePrice) * 100);
        discountBadge.style.display = "inline-flex";
        discountBadge.textContent = `-%${percent}`;
      } else {
        oldPriceEl.style.display = "none";
        discountBadge.style.display = "none";
      }

      const stockLine = document.getElementById("stockLine");
      stockLine.className = `stock-line ${stockClass(product)}`;
      stockLine.textContent = stockLabel(product);

      const buyButton = document.getElementById("buyButton");
      if (Number(product.stock || 0) <= 0) {
        buyButton.disabled = true;
        buyButton.textContent = "Stokta Yok";
      } else {
        buyButton.disabled = false;
        buyButton.textContent = "Sepete Ekle";
      }
    }

    function renderRelated(products) {
      const grid = document.getElementById("relatedGrid");
      if (!products.length) {
        grid.innerHTML = '<div class="cart-empty" style="grid-column:1/-1">Benzer urun bulunamadi.</div>';
        return;
      }

      grid.innerHTML = products.map((product) => `
        <a class="mini-card" href="urun.html?id=${encodeURIComponent(product.id)}">
          ${product.image
            ? `<img class="mini-image" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}" onerror="this.outerHTML='<div class=\\'mini-fallback\\'>Gorsel yok</div>'">`
            : `<div class="mini-fallback">Gorsel yok</div>`
          }
          <div class="mini-name">${escapeHtml(product.name)}</div>
          <div class="mini-meta">${escapeHtml(product.category)}</div>
          <div class="mini-price">${money(product.price)}</div>
        </a>
      `).join("");
    }

    function addCurrentProductToCart() {
      if (!currentProduct) return;
      const stock = Number(currentProduct.stock || 0);
      if (stock <= 0) {
        alert("Bu urun stokta yok.");
        return;
      }

      const qty = Math.max(1, Number(document.getElementById("qtyInput").value || 1));
      const cart = readCart();
      const found = cart.find((item) => String(item.id) === String(currentProduct.id));

      if (found) {
        found.quantity = Number(found.quantity || 0) + qty;
      } else {
        cart.push({
          id: currentProduct.id,
          name: currentProduct.name,
          price: Number(currentProduct.price || 0),
          unit: currentProduct.unit || "adet",
          quantity: qty
        });
      }

      saveCart(cart);
      alert("Urun sepete eklendi.");
    }

    async function loadPage() {
      const id = getParam("id");
      if (!id) {
        document.getElementById("loadingBox").textContent = "Urun bulunamadi.";
        return;
      }

      try {
        const { data, error } = await client
          .from("products")
          .select("*")
          .eq("id", id)
          .single();

        if (error || !data) {
          document.getElementById("loadingBox").textContent = "Urun yuklenemedi.";
          return;
        }

        const product = normalizeProduct(data);
        renderProduct(product);

        const { data: relatedData } = await client
          .from("products")
          .select("*")
          .eq("is_active", true)
          .eq("category", product.category)
          .neq("id", product.id)
          .limit(8);

        renderRelated((relatedData || []).map(normalizeProduct));
      } catch (err) {
        console.error(err);
        document.getElementById("loadingBox").textContent = "Urun yuklenemedi.";
      }
    }

    window.changeQty = changeQty;
    window.addCurrentProductToCart = addCurrentProductToCart;

    loadPage();
  </script>
</body>
</html>
