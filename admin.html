<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef3f9;margin:0}
.hidden{display:none}
.card{background:#fff;padding:20px;margin:20px;border-radius:12px}
</style>

</head>
<body>

<div id="loginView" class="card">
  <h2>Admin Paneli</h2>
  <p>Önce hesap sayfasından giriş yap</p>
  <button onclick="goLogin()">Hesap Sayfasına Git</button>
  <div id="loginStatus"></div>
</div>

<div id="panelView" class="hidden">
  <div class="card">
    <h2>Admin Panel</h2>
    <button onclick="logout()">Çıkış</button>
  </div>

  <div class="card">
    <h3>Siparişler</h3>
    <table border="1" width="100%">
      <thead>
        <tr>
          <th>ID</th>
          <th>Müşteri</th>
          <th>Tutar</th>
          <th>Durum</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>
</div>

<script>

const SUPABASE_URL = "BURAYA_URL";
const SUPABASE_KEY = "BURAYA_ANON_KEY";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function goLogin(){
  window.location.href="hesap.html";
}

function setStatus(text){
  document.getElementById("loginStatus").innerText=text;
}

function openPanel(){
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("panelView").classList.remove("hidden");
}

function closePanel(){
  document.getElementById("loginView").classList.remove("hidden");
  document.getElementById("panelView").classList.add("hidden");
}

async function getUser(){
  const {data} = await client.auth.getUser();
  return data?.user || null;
}

async function getProfile(){
  const user = await getUser();
  if(!user) return null;

  const {data} = await client
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  return data;
}

async function checkAdmin(){

  const user = await getUser();
  if(!user){
    setStatus("Giriş yapmalısın");
    return false;
  }

  const profile = await getProfile();
  if(!profile){
    setStatus("Profil yok");
    return false;
  }

  if(profile.role !== "admin"){
    setStatus("Admin değilsin");
    await client.auth.signOut();
    return false;
  }

  return true;
}

async function loadOrders(){
  const {data} = await client
    .from("orders")
    .select("*")
    .order("created_at",{ascending:false});

  const tbody = document.getElementById("ordersBody");

  if(!data || !data.length){
    tbody.innerHTML="<tr><td colspan='4'>Yok</td></tr>";
    return;
  }

  tbody.innerHTML = data.map(o=>`
    <tr>
      <td>${o.id}</td>
      <td>${o.customer_name}</td>
      <td>${o.total_amount} TL</td>
      <td>${o.status}</td>
    </tr>
  `).join("");
}

async function logout(){
  await client.auth.signOut();
  location.reload();
}

async function init(){

  closePanel();

  const ok = await checkAdmin();

  if(ok){
    openPanel();
    setStatus("Giriş OK");
    await loadOrders();
  }

}

init();

</script>

</body>
</html>
