<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ürün Detayı - Çanakoğlu Kapıda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eef3f9;--card:#fff;--text:#17324f;--muted:#6f8196;--primary:#f49a27;--primary2:#ffb34d;
      --navy:#1d4678;--border:#dbe6f1;--soft:0 8px 20px rgba(18,50,85,.07)
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    a{text-decoration:none;color:inherit}
    .wrap{max-width:1220px;margin:0 auto;padding:22px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:14px}
    .brand-logo{width:72px;height:72px;border-radius:50%;background:#fff;border:1px solid #f0d8b2;display:flex;align-items:center;justify-content:center;color:#6f8196;font-weight:800}
    .brand h1{margin:0;font-size:22px;color:var(--navy)}
    .muted{color:var(--muted)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border:none;border-radius:14px;font-weight:800;cursor:pointer}
    .primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);color:#fff}
    .secondary{background:#fff;color:var(--navy);border:1px solid var(--border)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:var(--soft)}
    .product-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:22px}
    .media-card{padding:22px}
    .media-box{height:520px;border-radius:22px;background:#f7f9fc;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .media-box img{max-width:100%;max-height:100%;object-fit:contain}
    .fallback{color:var(--muted);font-size:22px;font-weight:900}
    .info-card{padding:24px}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;background:#edf4ff;color:#225996;border:1px solid #cddcf7;font-size:12px;font-weight:900}
    .title{font-size:42px;line-height:1.05;font-weight:900;margin:14px 0 10px;color:var(--navy)}
    .category{font-size:14px;color:var(--muted);margin-bottom:14px}
    .price-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin:18px 0}
    .old-price{text-decoration:line-through;color:var(--muted);font-size:24px;font-weight:800}
    .new-price{font-size:54px;line-height:1;font-weight:900;color:#0f60c8}
    .discount{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;background:#fff5e7;color:#c97507;border:1px solid rgba(244,154,39,.22);font-size:14px;font-weight:900}
    .stock{margin:10px 0 18px;font-weight:800}
    .stock.ok{color:#1e7b36}
    .stock.out{color:#d93025}
    .desc{background:#fbfcfe;border:1px solid var(--border);border-radius:18px;padding:16px;line-height:1.75;color:#45607d;margin:18px 0}
    .buy-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px}
    .qty-box{display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .qty-box button{width:44px;height:48px;border:none;background:#fff;font-size:22px;font-weight:900;cursor:pointer;color:var(--navy)}
    .qty-box input{width:60px;height:48px;border:none;text-align:center;font-size:18px;font-weight:900;color:var(--navy);outline:none}
    .full{flex:1 1 240px;min-height:52px}
    .meta-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:20px}
    .meta-item{background:#fff;border:1px solid var(--border);border-radius:18px;padding:16px}
    .meta-item .label{font-size:12px;color:var(--muted);font-weight:900;margin-bottom:8px}
    .meta-item .value{font-size:18px;color:var(--navy);font-weight:900}
    .related{margin-top:26px}
    .related-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .mini-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:var(--soft)}
    .mini-card img,.mini-fallback{width:100%;height:160px;border-radius:14px;background:#f7f9fc;display:flex;align-items:center;justify-content:center;object-fit:contain}
    .mini-name{font-size:18px;font-weight:900;color:var(--navy);margin:12px 0 8px;line-height:1.2}
    .mini-price{font-size:28px;font-weight:900;color:#0f60c8}
    @media (max-width:980px){
      .product-layout{grid-template-columns:1fr}
      .media-box{height:360px}
      .related-grid{grid-template-columns:1fr 1fr}
      .title{font-size:34px}
      .new-price{font-size:44px}
    }
    @media (max-width:640px){
      .wrap{padding:16px}
      .related-grid{grid-template-columns:1fr}
      .meta-grid{grid-template-columns:1fr}
      .title{font-size:28px}
      .new-price{font-size:38px}
      .old-price{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html">
        <div class="brand-logo">Logo</div>
        <div>
          <h1>Çanakoğlu Kapıda</h1>
          <div class="muted">Tek tıkla kapımda • mahalle marketin</div>
        </div>
      </a>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn secondary" href="index.html">← Ana Sayfa</a>
        <a class="btn secondary" href="hesap.html">Hesabım</a>
      </div>
    </div>

    <div id="loadingBox" class="card" style="padding:22px">Yükleniyor...</div>

    <div id="productPage" style="display:none">
      <div class="product-layout">
        <div class="card media-card">
          <div class="media-box" id="productImageBox"></div>
        </div>
        <div class="card info-card">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <span id="campaignBadge" class="badge" style="display:none"></span>
            <span id="discountBadge" class="discount" style="display:none"></span>
          </div>
          <div id="productTitle" class="title">Ürün</div>
          <div id="productCategory" class="category">Kategori</div>

          <div class="price-row">
            <div id="oldPrice" class="old-price" style="display:none"></div>
            <div id="newPrice" class="new-price"></div>
          </div>

          <div id="stockInfo" class="stock ok"></div>
          <div id="productDesc" class="desc">Açıklama bulunamadı.</div>

          <div class="buy-bar">
            <div class="qty-box">
              <button type="button" onclick="changeQty(-1)">−</button>
              <input id="qtyInput" type="number" min="1" value="1" />
              <button type="button" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn primary full" type="button" onclick="addCurrentProductToCart()">🛒 Sepete Ekle</button>
          </div>

          <div class="meta-grid">
            <div class="meta-item"><div class="label">Barkod</div><div id="metaBarcode" class="value">-</div></div>
            <div class="meta-item"><div class="label">Birim</div><div id="metaUnit" class="value">adet</div></div>
            <div class="meta-item"><div class="label">Kategori</div><div id="metaCategory" class="value">-</div></div>
          </div>
        </div>
      </div>

      <div class="related">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:14px">
          <div>
            <div style="font-size:32px;font-weight:900;color:#17324f">Benzer Ürünler</div>
            <div class="muted">Aynı kategoriden diğer ürünler</div>
          </div>
        </div>
        <div id="relatedGrid" class="related-grid"></div>
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://jpguymicdiujhutnycvl.supabase.co";
const SUPABASE_KEY = "sb_publishable_qhih14wKxwoit8TtaQwCvg_T04SQLAN";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentProduct = null;

function money(v){
  const n = Number(v || 0);
  return new Intl.NumberFormat('tr-TR', { style:'currency', currency:'TRY', maximumFractionDigits:2 }).format(n);
}
function escapeHtml(str=''){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getParam(name){
  return new URL(window.location.href).searchParams.get(name);
}
function normalizeProduct(row){
  return {
    ...row,
    image: row.image || row.image_url || '',
    comparePrice: Number(row.comparePrice || row.compare_at_price || 0),
    campaignLabel: row.campaignLabel || row.campaign_label || ''
  };
}
function changeQty(delta){
  const input = document.getElementById('qtyInput');
  let value = Number(input.value || 1);
  value += delta;
  if(value < 1) value = 1;
  input.value = value;
}
function getCart(){
  try { return JSON.parse(localStorage.getItem('canakoglu_cart') || '[]'); } catch { return []; }
}
function saveCart(cart){
  localStorage.setItem('canakoglu_cart', JSON.stringify(cart));
}
function addCurrentProductToCart(){
  if(!currentProduct) return;
  const qty = Math.max(1, Number(document.getElementById('qtyInput').value || 1));
  const cart = getCart();
  const found = cart.find(item => String(item.id) === String(currentProduct.id));
  if(found){
    found.qty = Number(found.qty || 0) + qty;
  }else{
    cart.push({ id: currentProduct.id, name: currentProduct.name, price: Number(currentProduct.price || 0), image: currentProduct.image || '', qty });
  }
  saveCart(cart);
  alert('Ürün sepete eklendi');
}
function renderProduct(product){
  currentProduct = product;
  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('productPage').style.display = 'block';

  document.getElementById('productImageBox').innerHTML = product.image
    ? `<img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name || 'Ürün')}">`
    : `<div class="fallback">Görsel yok</div>`;

  document.getElementById('productTitle').textContent = product.name || 'Ürün';
  document.getElementById('productCategory').textContent = product.category || 'Kategori yok';
  document.getElementById('newPrice').textContent = money(product.price || 0);

  const oldPriceEl = document.getElementById('oldPrice');
  if(Number(product.comparePrice || 0) > Number(product.price || 0)){
    oldPriceEl.style.display = 'block';
    oldPriceEl.textContent = money(product.comparePrice);
  } else {
    oldPriceEl.style.display = 'none';
  }

  const campaign = document.getElementById('campaignBadge');
  if(product.campaignLabel){
    campaign.style.display = 'inline-flex';
    campaign.textContent = product.campaignLabel;
  }

  const discount = document.getElementById('discountBadge');
  if(Number(product.comparePrice || 0) > Number(product.price || 0)){
    const percent = Math.round(((Number(product.comparePrice) - Number(product.price)) / Number(product.comparePrice)) * 100);
    discount.style.display = 'inline-flex';
    discount.textContent = `-%${percent}`;
  }

  const stock = Number(product.stock_qty ?? product.stock ?? 0);
  const stockEl = document.getElementById('stockInfo');
  stockEl.className = stock > 0 ? 'stock ok' : 'stock out';
  stockEl.textContent = stock > 0 ? `Stokta var • ${stock} adet` : 'Stokta yok';

  document.getElementById('productDesc').textContent = product.description || 'Bu ürün için açıklama eklenmemiş.';
  document.getElementById('metaBarcode').textContent = product.barcode || '-';
  document.getElementById('metaUnit').textContent = product.unit || 'adet';
  document.getElementById('metaCategory').textContent = product.category || '-';
}
function renderRelated(list){
  const grid = document.getElementById('relatedGrid');
  if(!list || !list.length){
    grid.innerHTML = '<div class="muted">Benzer ürün bulunamadı.</div>';
    return;
  }
  grid.innerHTML = list.map(item => `
    <a class="mini-card" href="urun.html?id=${encodeURIComponent(item.id)}">
      ${item.image ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || 'Ürün')}">` : `<div class="mini-fallback">Görsel yok</div>`}
      <div class="mini-name">${escapeHtml(item.name || 'Ürün')}</div>
      <div class="muted">${escapeHtml(item.category || '')}</div>
      <div class="mini-price">${money(item.price || 0)}</div>
    </a>
  `).join('');
}
async function loadPage(){
  const id = getParam('id');
  if(!id){
    document.getElementById('loadingBox').textContent = 'Ürün bulunamadı.';
    return;
  }
  const { data, error } = await client.from('products').select('*').eq('id', id).single();
  if(error || !data){
    document.getElementById('loadingBox').textContent = 'Ürün yüklenemedi.';
    return;
  }
  const product = normalizeProduct(data);
  renderProduct(product);

  const { data: relatedData } = await client
    .from('products')
    .select('*')
    .eq('is_active', true)
    .eq('category', product.category)
    .neq('id', product.id)
    .limit(8);

  renderRelated((relatedData || []).map(normalizeProduct));
}
loadPage();
</script>
</body>
</html>
